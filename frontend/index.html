<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO List</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="conteiner">
        <h1>Gerenciador de Tarefas</h1>
        
        <div class="cartao">
            <h2 id="titulo-formulario">Nova Tarefa</h2>
            <form id="formulario-tarefa">
                <input type="hidden" id="id-tarefa">
                
                <div class="grupo-controle">
                    <label for="titulo">Título:</label>
                    <input type="text" id="titulo" required>
                </div>
                
                <div class="grupo-controle">
                    <label for="descricao">Descrição:</label>
                    <textarea id="descricao" rows="3" required></textarea>
                </div>
                
                <div class="grupo-controle">
                    <label for="status">Status:</label>
                    <select id="status">
                        <option value="TODO">TODO (A Fazer)</option>
                        <option value="DOING">DOING (Fazendo)</option>
                        <option value="DONE">DONE (Concluído)</option>
                    </select>
                </div>
                
                <div class="botoes-acao">
                    <button type="submit" id="botao-salvar">Salvar Tarefa</button>
                    <button type="button" id="botao-cancelar" class="oculto">Cancelar Edição</button>
                </div>
            </form>
        </div>

        <div class="filtros">
            <label for="filtro-status">Filtrar por Status:</label>
            <select id="filtro-status">
                <option value="TODOS">Todos</option>
                <option value="TODO">TODO</option>
                <option value="DOING">DOING</option>
                <option value="DONE">DONE</option>
            </select>
        </div>

        <div class="cartao">
            <h2>Minhas Tarefas</h2>
            <ul id="lista-tarefas">
                </ul>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
